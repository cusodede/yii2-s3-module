name: CI
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    name: PHP ${{ matrix.php }}

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - 8.4
          - 8.5

    services:
      postgres:
        image: postgres:13.4
        env:
          POSTGRES_DB: s3_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data --console-address ":9001"

          timeout 30 bash -c 'until curl -fs http://127.0.0.1:9000/minio/health/live; do sleep 1; done'

      - name: Create MinIO buckets
        run: |
          docker run --rm --network host --entrypoint /bin/sh minio/mc:latest -c "
            mc alias set local http://127.0.0.1:9000 minioadmin minioadmin &&
            mc mb -p local/testbucket local/first-bucket local/second-bucket
          "

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          extensions: zip, pdo_pgsql, sockets, bcmath, pcntl, intl, mbstring
          coverage: none
          ini-values: memory_limit=256M

      - name: Check PHP and Composer
        run: |
          php -v
          composer --version
          php -m

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Setup test environment
        run: |
          cp tests/.env.ci tests/.env

          # Verify MinIO is accessible
          curl -I http://127.0.0.1:9000

      - name: Run database migrations
        run: |
          cd tests/_app
          php yii migrate/up --interactive=0 --migrationPath=../../migrations
          php yii migrate/up --interactive=0 --migrationPath=migrations

      - name: Run tests
        run: vendor/bin/codecept run -v --debug
        env:
          DB_DSN: pgsql:host=127.0.0.1;port=5432;dbname=s3_test
          DB_USER: postgres
          DB_PASS: postgres
          MINIO_HOST: http://127.0.0.1:9000
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
